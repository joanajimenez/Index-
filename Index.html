<!DOCTYPE html>
<html lang="es">

<head>

<base target="_top">

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Puntos Emisores</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

:root{

--azul:#0D5CAB;

--azul2:#156FC2;

--gris:#F4F7FB;

--texto:#27313D;

--borde:#D9E3EC;

--card:#FFFFFF;

--radio:14px;

--sombra:
0 8px 22px rgba(0,0,0,.08);

}

html{

scroll-behavior:smooth;

}

body{

font-family:'Inter',sans-serif;

background:#EEF4FB;

color:var(--texto);

padding:24px;

min-height:100vh;

overflow-x:hidden;

position:relative;

}

/*=================================

MAPA DEL MUNDO

==================================*/

body::before{

content:"";

position:fixed;

inset:0;

background-image:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");

background-repeat:no-repeat;

background-position:center;

background-size:82%;

opacity:.05;

pointer-events:none;

z-index:-1;

}

/*=================================

TITULO

==================================*/

h1{

font-size:34px;

font-weight:800;

text-align:center;

color:#11437A;

margin-bottom:22px;

}

/*=================================

BARRA SUPERIOR - SOLO PAÍS AL INICIO

==================================*/

.topbar{

display:flex;

align-items:center;

gap:16px;

background:linear-gradient(135deg, #0D5CAB 0%, #156FC2 100%);

padding:16px 24px;

border-radius:16px;

box-shadow:var(--sombra);

margin-bottom:24px;

}

#btnResumen{

background:rgba(255,255,255,0.25);

color:white;

border:2px solid white;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

font-size:14px;

font-weight:700;

transition:.25s;

white-space:nowrap;

flex-shrink:0;

}

#btnResumen:hover{

background:rgba(255,255,255,0.4);

}

select{

flex:1;

height:44px;

border:none;

border-radius:8px;

padding:0 14px;

font-size:14px;

background:white;

outline:none;

transition:.2s;

color:#27313D;

}

select:focus{

box-shadow:0 0 0 3px rgba(255,255,255,.3);

}

select:disabled{

background:#f5f5f5;

color:#999;

cursor:not-allowed;

opacity:0.6;

}

#resultado{

margin-top:18px;

}

/*=================================

BUSCADOR

==================================*/

.search{

margin-bottom:16px;

display:none;

}

.search.visible{

display:block;

}

.search input{

width:100%;

height:46px;

padding:0 16px;

border-radius:10px;

border:1px solid var(--borde);

font-size:14px;

outline:none;

}

.search input:focus{

border-color:var(--azul);

box-shadow:0 0 0 3px rgba(13,92,171,.15);

}

/*=========================================
=            TARJETAS PRINCIPALES          =
=========================================*/

.card{

background:var(--card);

border-radius:14px;

box-shadow:var(--sombra);

margin-bottom:8px;

overflow:hidden;

border:1px solid rgba(0,0,0,.04);

transition:.25s;

}

.card:hover{

transform:translateY(-2px);

box-shadow:0 12px 28px rgba(0,0,0,.10);

}

.cardHeader{

display:flex;

justify-content:space-between;

align-items:center;

padding:10px 14px;

cursor:pointer;

background:#fff;

}

.cardInfo{

flex:1;

min-width:0;

}

.cardTitle{

font-size:13px;

font-weight:700;

color:#11437A;

line-height:1.3;

text-align:left;

}

.cardSubtitle{

margin-top:2px;

font-size:11px;

color:#6b7280;

text-align:left;

}

.cardIcon{

width:30px;

height:30px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

background:#E8F2FC;

color:var(--azul);

font-size:16px;

font-weight:700;

flex-shrink:0;

margin-left:10px;

}

.cardBody{

display:none;

padding:12px 14px;

background:#FBFDFF;

border-top:1px solid #E8EEF5;

}

/*=========================================
=          GRID DE INFORMACIÓN            =
=========================================*/

.infoGrid{

display:grid;

grid-template-columns:1fr;

gap:8px;

}

.infoItem{

background:#fff;

border:1px solid var(--borde);

border-radius:10px;

padding:8px 10px;

min-height:auto;

}

.infoLabel{

font-size:10px;

font-weight:700;

text-transform:uppercase;

letter-spacing:.3px;

color:#11437A;

margin-bottom:3px;

text-align:left;

}

.infoValue{

font-size:12px;

line-height:1.45;

color:#2E3742;

word-break:break-word;

white-space:pre-wrap;

text-align:left;

}

/*=========================================
=             LINKS                       =
=========================================*/

.infoValue a{

color:var(--azul);

font-weight:600;

text-decoration:none;

}

.infoValue a:hover{

text-decoration:underline;

}

/*=========================================
=          CONTADOR RESULTADOS            =
=========================================*/

.resultadoHeader{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:14px;

gap:14px;

flex-wrap:wrap;

}

.resultadoTitulo{

font-size:28px;

font-weight:800;

color:#11437A;

text-align:left;

}

.resultadoCantidad{

background:white;

padding:8px 16px;

border-radius:999px;

box-shadow:var(--sombra);

font-size:12px;

font-weight:700;

color:var(--azul);

}

/*=========================================
=            VISTA RÁPIDA                 =
=========================================*/

#vistaRapida{

display:none;

background:#fff;

border-radius:16px;

padding:18px;

box-shadow:var(--sombra);

}

#vistaRapida h2{

margin-bottom:16px;

color:#11437A;

font-size:24px;

font-weight:800;

text-align:left;

}

.tablaResponsive{

overflow:auto;

border-radius:12px;

border:1px solid var(--borde);

}

table{

width:100%;

border-collapse:collapse;

font-size:12px;

}

thead{

background:var(--azul);

color:#fff;

}

thead th{

padding:12px;

position:sticky;

top:0;

text-align:left;

white-space:nowrap;

}

tbody td{

padding:10px;

border-bottom:1px solid #E7EDF4;

vertical-align:top;

text-align:left;

white-space:pre-wrap;

}

tbody tr:nth-child(even){

background:#F8FBFE;

}

/*=========================================
=             LOADING                     =
=========================================*/

.loading{

background:#fff;

padding:26px;

border-radius:16px;

text-align:center;

font-size:15px;

font-weight:600;

box-shadow:var(--sombra);

}

/*=========================================
=           RESPONSIVE                    =
=========================================*/

@media(max-width:900px){

.topbar{

flex-direction:column;

align-items:stretch;

}

#btnResumen{

width:100%;

}

.infoGrid{

grid-template-columns:1fr;

}

.resultadoTitulo{

font-size:22px;

}

h1{

font-size:28px;

}

}

</style>

</head><body>

<h1>PUNTOS EMISORES</h1>

<div class="topbar">

<button
id="btnResumen">

📊 Vista rápida

</button>

<select id="pais">

<option value="">

Seleccione país para visualizar puntos emisores

</option>

</select>

<select id="tipo" style="display:none;">

<option value="">

Seleccione tipo

</option>

</select>

<select id="pvd" style="display:none;">

<option value="">

Seleccione Punto Emisor

</option>

</select>

</div>

<div class="search">

<input

type="text"

id="txtBuscar"

placeholder="🔎 Buscar dentro de los resultados...">

</div>

<div id="resultado"></div>

<div id="vistaRapida"></div>

<script>

let headers=[];

let rows=[];

let allRows=[];

/*====================================

INICIO

====================================*/

window.onload=()=>{

cargarOpciones();

document
.getElementById("pais")
.addEventListener("change",actualizarFiltros);

document
.getElementById("tipo")
.addEventListener("change",actualizarTipo);

document
.getElementById("pvd")
.addEventListener("change",buscar);

document
.getElementById("txtBuscar")
.addEventListener("keyup",filtrarTarjetas);

document
.getElementById("btnResumen")
.addEventListener("click",mostrarVistaRapida);

};

/*====================================

CARGAR OPCIONES - SOLO PAÍSES

====================================*/

function cargarOpciones(){

google.script.run

.withSuccessHandler(data=>{

llenarSelect(

"pais",

data.paises,

"Seleccione país para visualizar puntos emisores"

);

})

.withFailureHandler(error=>{

console.error('Error al cargar países:',error);

})

.getOptions();

}

/*====================================

LLENAR SELECT

====================================*/

function llenarSelect(

id,

lista,

texto

){

const select=

document.getElementById(id);

select.innerHTML="";

const opt=

document.createElement("option");

opt.value="";

opt.textContent=texto;

select.appendChild(opt);

lista.forEach(item=>{

const o=

document.createElement("option");

o.value=item;

o.textContent=item;

select.appendChild(o);

});

}

/*====================================

ACTUALIZAR FILTROS - PAÍS SELECCIONADO

====================================*/

function actualizarFiltros(){

const pais = document.getElementById("pais").value;

if(!pais){

document.getElementById("tipo").style.display="none";

document.getElementById("pvd").style.display="none";

document.getElementById("resultado").innerHTML="";

document.querySelector(".search").classList.remove("visible");

return;

}

// Mostrar Tipo cuando se selecciona País
document.getElementById("tipo").style.display="block";

const filtros={ pais };

google.script.run

.withSuccessHandler(data=>{

llenarSelect(

"tipo",

data.tipos,

"Seleccione tipo"

);

document.getElementById("pvd").style.display="none";

document.getElementById("resultado").innerHTML="";

document.querySelector(".search").classList.remove("visible");

})

.withFailureHandler(error=>{

console.error('Error al cargar tipos:',error);

})

.getOptionsFiltered(filtros);

}

/*====================================

ACTUALIZAR TIPO - TIPO SELECCIONADO

====================================*/

function actualizarTipo(){

const pais = document.getElementById("pais").value;

const tipo = document.getElementById("tipo").value;

if(!pais || !tipo){

document.getElementById("pvd").style.display="none";

document.getElementById("resultado").innerHTML="";

document.querySelector(".search").classList.remove("visible");

return;

}

// Mostrar PVD cuando se selecciona Tipo
document.getElementById("pvd").style.display="block";

const filtros={ pais, tipo };

google.script.run

.withSuccessHandler(data=>{

llenarSelect(

"pvd",

data.pvds,

"Seleccione Punto Emisor"

);

document.getElementById("resultado").innerHTML="";

document.querySelector(".search").classList.remove("visible");

})

.withFailureHandler(error=>{

console.error('Error al cargar PVD:',error);

})

.getOptionsFiltered(filtros);

}

/*====================================

BUSCAR

====================================*/

function buscar(){

const pais = document.getElementById("pais").value;

const tipo = document.getElementById("tipo").value;

const pvd = document.getElementById("pvd").value;

if(!pais){

document.getElementById("resultado").innerHTML=

'<div class="loading">Por favor, selecciona un país</div>';

return;

}

if(!tipo){

document.getElementById("resultado").innerHTML=

'<div class="loading">Por favor, selecciona un tipo</div>';

return;

}

const filtros={ pais, tipo, pvd };

document.getElementById("resultado").innerHTML=

'<div class="loading">⏳ Cargando información...</div>';

document.getElementById("vistaRapida").style.display="none";

google.script.run

.withSuccessHandler(data=>{

headers=data.headers;

rows=data.rows;

allRows=[...rows];

if(rows.length===0){

document.getElementById("resultado").innerHTML=

'<div class="loading">❌ No se encontraron resultados</div>';

document.querySelector(".search").classList.remove("visible");

}else{

renderResultados(rows);

document.querySelector(".search").classList.add("visible");

}

})

.withFailureHandler(error=>{

document.getElementById("resultado").innerHTML=

'<div class="loading">❌ Error: '+error+'</div>';

console.error('Error en búsqueda:',error);

})

.search(filtros);

}

/*====================================

RENDERIZAR RESULTADOS

====================================*/

function renderResultados(rowsToRender){

const resultado = document.getElementById("resultado");

resultado.innerHTML="";

const headerDiv = document.createElement("div");

headerDiv.className="resultadoHeader";

headerDiv.innerHTML=`

<div class="resultadoTitulo">Resultados</div>

<div class="resultadoCantidad">${rowsToRender.length} encontrados</div>

`;

resultado.appendChild(headerDiv);

rowsToRender.forEach((row,idx)=>{

const card=document.createElement("div");

card.className="card";

let titulo="";

let subtitulo="";

if(headers.length>0){

titulo=row[headers[0]]||"";

if(headers.length>1){

subtitulo=row[headers[1]]||"";

}

}

card.innerHTML=`

<div class="cardHeader" onclick="toggleCard(this)">

<div class="cardInfo">

<div class="cardTitle">${escapeHtml(String(titulo))}</div>

<div class="cardSubtitle">${escapeHtml(String(subtitulo))}</div>

</div>

<div class="cardIcon">▼</div>

</div>

<div class="cardBody">

<div class="infoGrid">

${headers.map(h=>`

<div class="infoItem">

<div class="infoLabel">${escapeHtml(h)}</div>

<div class="infoValue">${linkify(row[h]??"")}</div>

</div>

`).join("")}

</div>

</div>

`;

resultado.appendChild(card);

});

}

function toggleCard(header){

const body=header.nextElementSibling;

if(body.style.display==="block"){

body.style.display="none";

}else{

document.querySelectorAll(".cardBody").forEach(b=>b.style.display="none");

body.style.display="block";

}

}

/*====================================

VISTA RÁPIDA

====================================*/

function mostrarVistaRapida(){

if(rows.length===0){

alert("Primero realiza una búsqueda.");

return;

}

let html=`

<h2>Vista rápida</h2>

<div class="tablaResponsive">

<table>

<thead>

<tr>

`;

headers.forEach(h=>{

html+=`<th>${escapeHtml(h)}</th>`;

});

html+=`

</tr>

</thead>

<tbody>

`;

rows.forEach(r=>{

html+="<tr>";

headers.forEach(h=>{

html+=`

<td>

${linkify(r[h]??"")}

</td>

`;

});

html+="</tr>";

});

html+=`

</tbody>

</table>

</div>

`;

const vistaRapida=document.getElementById("vistaRapida");

vistaRapida.innerHTML=html;

vistaRapida.style.display="block";

}

/*====================================

FILTRAR TARJETAS

====================================*/

function filtrarTarjetas(){

const txt=document.getElementById("txtBuscar").value.toLowerCase();

const tarjetas=document.querySelectorAll(".card");

let visible=0;

tarjetas.forEach(tarjeta=>{

const contenido=tarjeta.textContent.toLowerCase();

if(contenido.includes(txt)){

tarjeta.style.display="";

visible++;

}else{

tarjeta.style.display="none";

}

});

const contador=document.querySelector(".resultadoCantidad");

if(contador){

contador.textContent=visible+" resultados";

}

}

/*====================================

UTILIDADES

====================================*/

function escapeHtml(text){

const div=document.createElement("div");

div.textContent=text;

return div.innerHTML;

}

function linkify(text){

const str=String(text??"");

const urlRegex=/(https?:\/\/[^\s]+)/g;

return str.replace(urlRegex,'<a href="$1" target="_blank">🔗 Abrir</a>');

}

</script>

</body>

</html>
