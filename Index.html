<!DOCTYPE html>
<html lang="es">

<head>

<base target="_top">

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Puntos Emisores</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

:root{

--azul:#0D5CAB;

--azul2:#156FC2;

--verde:#22C55E;

--gris:#F4F7FB;

--texto:#27313D;

--borde:#D9E3EC;

--card:#FFFFFF;

--radio:14px;

--sombra:
0 8px 22px rgba(0,0,0,.08);

}

html{

scroll-behavior:smooth;

}

body{

font-family:'Inter',sans-serif;

background:#EEF4FB;

color:var(--texto);

padding:24px;

min-height:100vh;

overflow-x:hidden;

position:relative;

}

/*=================================

MAPA DEL MUNDO

==================================*/

body::before{

content:"";

position:fixed;

inset:0;

background-image:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");

background-repeat:no-repeat;

background-position:center;

background-size:82%;

opacity:.05;

pointer-events:none;

z-index:-1;

}

/*=================================

TITULO

==================================*/

h1{

font-size:34px;

font-weight:800;

text-align:center;

color:#11437A;

margin-bottom:22px;

}

/*=================================

BARRA SUPERIOR

==================================*/

.topbar{

display:flex;

align-items:center;

gap:16px;

background:linear-gradient(135deg, #0D5CAB 0%, #156FC2 100%);

padding:16px 24px;

border-radius:16px;

box-shadow:var(--sombra);

margin-bottom:24px;

}

#btnResumen{

background:var(--verde);

color:white;

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

font-size:14px;

font-weight:700;

transition:.25s;

white-space:nowrap;

flex-shrink:0;

box-shadow:0 4px 12px rgba(34, 197, 94, 0.3);

}

#btnResumen:hover{

background:#16a34a;

box-shadow:0 6px 16px rgba(34, 197, 94, 0.4);

transform:translateY(-2px);

}

select{

flex:1;

height:44px;

border:none;

border-radius:8px;

padding:0 14px;

font-size:14px;

background:white;

outline:none;

transition:.2s;

color:#27313D;

}

select:focus{

box-shadow:0 0 0 3px rgba(255,255,255,.3);

}

#resultado{

margin-top:18px;

}

/*=========================================
=            TARJETAS                      =
=========================================*/

.card{

background:var(--card);

border-radius:14px;

box-shadow:var(--sombra);

margin-bottom:8px;

overflow:hidden;

border:1px solid rgba(0,0,0,.04);

transition:.25s;

}

.card:hover{

transform:translateY(-2px);

box-shadow:0 12px 28px rgba(0,0,0,.10);

}

.cardHeader{

display:flex;

justify-content:space-between;

align-items:center;

padding:10px 14px;

cursor:pointer;

background:#fff;

}

.cardInfo{

flex:1;

min-width:0;

}

.cardTitle{

font-size:13px;

font-weight:700;

color:#11437A;

line-height:1.3;

text-align:left;

}

.cardSubtitle{

margin-top:2px;

font-size:11px;

color:#6b7280;

text-align:left;

}

.cardIcon{

width:30px;

height:30px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

background:#E8F2FC;

color:var(--azul);

font-size:16px;

font-weight:700;

flex-shrink:0;

margin-left:10px;

}

.cardBody{

display:none;

padding:12px 14px;

background:#FBFDFF;

border-top:1px solid #E8EEF5;

}

.infoGrid{

display:grid;

grid-template-columns:1fr 1fr;

gap:8px;

}

.infoItem{

background:#fff;

border:1px solid var(--borde);

border-radius:10px;

padding:8px 10px;

min-height:auto;

}

.infoItem.full{

grid-column:1 / -1;

}

.infoLabel{

font-size:10px;

font-weight:700;

text-transform:uppercase;

letter-spacing:.3px;

color:#11437A;

margin-bottom:3px;

text-align:left;

}

.infoValue{

font-size:12px;

line-height:1.45;

color:#2E3742;

word-break:break-word;

white-space:pre-wrap;

text-align:left;

}

.infoValue a{

color:var(--azul);

font-weight:600;

text-decoration:none;

}

.infoValue a:hover{

text-decoration:underline;

}

/*=========================================
=            TABLA                        =
=========================================*/

.tablaResponsive{

overflow:auto;

border-radius:12px;

border:1px solid var(--borde);

margin-top:16px;

}

table{

width:100%;

border-collapse:collapse;

font-size:12px;

}

thead{

background:var(--azul);

color:#fff;

}

thead th{

padding:12px;

position:sticky;

top:0;

text-align:left;

white-space:nowrap;

}

tbody td{

padding:10px;

border-bottom:1px solid #E7EDF4;

vertical-align:top;

text-align:left;

white-space:pre-wrap;

}

tbody tr:nth-child(even){

background:#F8FBFE;

}

h2{

font-size:24px;

font-weight:800;

color:#11437A;

margin-bottom:16px;

text-align:left;

}

/*=========================================
=             LOADING                     =
=========================================*/

.loading{

background:#fff;

padding:26px;

border-radius:16px;

text-align:center;

font-size:15px;

font-weight:600;

box-shadow:var(--sombra);

}

/*=========================================
=           RESPONSIVE                    =
=========================================*/

@media(max-width:900px){

.topbar{

flex-direction:column;

align-items:stretch;

}

#btnResumen{

width:100%;

}

.infoGrid{

grid-template-columns:1fr;

}

h1{

font-size:28px;

}

}

</style>

</head><body>

<h1>PUNTOS EMISORES</h1>

<div class="topbar">

<button id="btnResumen">📊 Vista rápida</button>

<select id="pais">

<option value="">Seleccione país para visualizar puntos emisores</option>

</select>

</div>

<div id="resultado"></div>

<script>

let headers=[];

let rows=[];

const COLUMNS_ORDER = ['PAIS', 'TIPO', 'PUNTO EMISOR', 'NOMBRE PVD', 'HERRAMIENTA', 'FILTRO 89'];

const FULL_WIDTH_FIELDS = ['NOMBRE PVD', 'HERRAMIENTA', 'DETALLE Y PARTICULARIDADES', 'NOMBRE DE PRODUCTOS'];

/*====================================
INICIO
====================================*/

window.onload=()=>{

cargarOpciones();

document.getElementById("btnResumen").addEventListener("click", vistaRapida);

document.getElementById("pais").addEventListener("change", filtrarPorPais);

};

/*====================================
CARGAR PAÍSES
====================================*/

function cargarOpciones(){

google.script.run

.withSuccessHandler(data=>{

const select = document.getElementById("pais");

select.innerHTML = '<option value="">Seleccione país para visualizar puntos emisores</option>';

data.paises.forEach(pais=>{

const opt = document.createElement("option");

opt.value = pais;

opt.textContent = pais;

select.appendChild(opt);

});

})

.withFailureHandler(error=>{

console.error('Error:', error);

alert('Error al cargar países: ' + error);

})

.getOptions();

}

/*====================================
VISTA RÁPIDA - TODOS LOS DATOS (TABLA)
====================================*/

function vistaRapida(){

document.getElementById("resultado").innerHTML = '<div class="loading">⏳ Cargando...</div>';

google.script.run

.withSuccessHandler(data=>{

headers = data.headers;

rows = data.rows;

renderTable(rows, headers, "Vista rápida de Puntos Emisores");

})

.withFailureHandler(error=>{

document.getElementById("resultado").innerHTML = '<div class="loading">❌ Error: '+error+'</div>';

console.error('Error:', error);

})

.getAllData();

}

/*====================================
FILTRAR POR PAÍS - TARJETAS
====================================*/

function filtrarPorPais(){

const pais = document.getElementById("pais").value;

if(!pais){

document.getElementById("resultado").innerHTML = "";

return;

}

document.getElementById("resultado").innerHTML = '<div class="loading">⏳ Cargando...</div>';

google.script.run

.withSuccessHandler(data=>{

headers = data.headers;

rows = data.rows;

renderCards(rows, headers);

})

.withFailureHandler(error=>{

document.getElementById("resultado").innerHTML = '<div class="loading">❌ Error: '+error+'</div>';

console.error('Error:', error);

})

.search({ pais });

}

/*====================================
RENDERIZAR TABLA - SOLO 6 COLUMNAS
====================================*/

function renderTable(rowsToShow, allHeaders, titulo){

// Encontrar índices de las columnas que queremos
const headersToShow = [];

const colIndices = [];

COLUMNS_ORDER.forEach(colName => {

const idx = allHeaders.findIndex(h => h.toUpperCase().includes(colName.toUpperCase()));

if(idx !== -1){

headersToShow.push(allHeaders[idx]);

colIndices.push(idx);

}

});

let html = `<h2>${titulo}</h2><div class="tablaResponsive"><table><thead><tr>`;

headersToShow.forEach(h=>{

html += `<th>${escapeHtml(h)}</th>`;

});

html += `</tr></thead><tbody>`;

rowsToShow.forEach(r=>{

html += "<tr>";

colIndices.forEach(idx=>{

html += `<td>${linkify(r[allHeaders[idx]]??"")}</td>`;

});

html += "</tr>";

});

html += `</tbody></table></div>`;

document.getElementById("resultado").innerHTML = html;

}

/*====================================
RENDERIZAR TARJETAS
====================================*/

function renderCards(rowsToShow, allHeaders){

let html = "";

rowsToShow.forEach((row, idx)=>{

const titulo = row['Nombre en Portal de Venta Directa (PVD)'] || row['PUNTO EMISOR'] || "Sin nombre";

const subtitulo = row['PUNTO EMISOR'] || "";

html += `

<div class="card">

<div class="cardHeader" onclick="toggleCard(this)">

<div class="cardInfo">

<div class="cardTitle">▼ ${escapeHtml(String(titulo))}</div>

<div class="cardSubtitle">${escapeHtml(String(subtitulo))}</div>

</div>

<div class="cardIcon">−</div>

</div>

<div class="cardBody">

<div class="infoGrid">

`;

allHeaders.forEach(h => {

const value = row[h] ?? "";

const isFullWidth = FULL_WIDTH_FIELDS.some(fw => h.toUpperCase().includes(fw.toUpperCase()));

html += `

<div class="infoItem ${isFullWidth ? 'full' : ''}">

<div class="infoLabel">${escapeHtml(h)}</div>

<div class="infoValue">${linkify(value)}</div>

</div>

`;

});

html += `</div></div></div>`;

});

document.getElementById("resultado").innerHTML = html || '<div class="loading">❌ Sin resultados</div>';

}

function toggleCard(header){

const body = header.nextElementSibling;

if(body.style.display==="block"){

body.style.display="none";

header.querySelector('.cardIcon').textContent = '−';

}else{

document.querySelectorAll(".cardBody").forEach(b=>b.style.display="none");

document.querySelectorAll(".cardIcon").forEach(i=>i.textContent='−');

body.style.display="block";

header.querySelector('.cardIcon').textContent = '+';

}

}

/*====================================
UTILIDADES
====================================*/

function escapeHtml(text){

const div = document.createElement("div");

div.textContent = text;

return div.innerHTML;

}

function linkify(text){

const str = String(text??"");

const urlRegex = /(https?:\/\/[^\s]+)/g;

return str.replace(urlRegex, '<a href="$1" target="_blank">🔗 Abrir</a>');

}

</script>

</body>

</html>
