<!DOCTYPE html>
<html lang="es">

<head>

<base target="_top">

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Puntos Emisores</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

:root{

--azul:#0D5CAB;

--azul2:#156FC2;

--gris:#F4F7FB;

--texto:#27313D;

--borde:#D9E3EC;

--card:#FFFFFF;

--radio:14px;

--sombra:
0 8px 22px rgba(0,0,0,.08);

}

html{

scroll-behavior:smooth;

}

body{

font-family:'Inter',sans-serif;

background:#EEF4FB;

color:var(--texto);

padding:24px;

min-height:100vh;

overflow-x:hidden;

position:relative;

}

/*=================================

MAPA DEL MUNDO

==================================*/

body::before{

content:"";

position:fixed;

inset:0;

background-image:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");

background-repeat:no-repeat;

background-position:center;

background-size:82%;

opacity:.05;

pointer-events:none;

z-index:-1;

}

/*=================================

TITULO

==================================*/

h1{

font-size:34px;

font-weight:800;

text-align:center;

color:#11437A;

margin-bottom:22px;

}

/*=================================

BARRA SUPERIOR - SOLO BOTÓN Y DESPLEGABLE

==================================*/

.topbar{

display:flex;

align-items:center;

gap:16px;

background:linear-gradient(135deg, #0D5CAB 0%, #156FC2 100%);

padding:16px 24px;

border-radius:16px;

box-shadow:var(--sombra);

margin-bottom:24px;

}

#btnResumen{

background:rgba(255,255,255,0.25);

color:white;

border:2px solid white;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

font-size:14px;

font-weight:700;

transition:.25s;

white-space:nowrap;

flex-shrink:0;

}

#btnResumen:hover{

background:rgba(255,255,255,0.4);

}

select{

flex:1;

height:44px;

border:none;

border-radius:8px;

padding:0 14px;

font-size:14px;

background:white;

outline:none;

transition:.2s;

color:#27313D;

}

select:focus{

box-shadow:0 0 0 3px rgba(255,255,255,.3);

}

#resultado{

margin-top:18px;

}

/*=========================================
=            VISTA RÁPIDA                 =
=========================================*/

#vistaRapida{

display:none;

background:#fff;

border-radius:16px;

padding:18px;

box-shadow:var(--sombra);

}

#vistaRapida h2{

margin-bottom:16px;

color:#11437A;

font-size:24px;

font-weight:800;

text-align:left;

}

.tablaResponsive{

overflow:auto;

border-radius:12px;

border:1px solid var(--borde);

}

table{

width:100%;

border-collapse:collapse;

font-size:12px;

}

thead{

background:var(--azul);

color:#fff;

}

thead th{

padding:12px;

position:sticky;

top:0;

text-align:left;

white-space:nowrap;

}

tbody td{

padding:10px;

border-bottom:1px solid #E7EDF4;

vertical-align:top;

text-align:left;

white-space:pre-wrap;

}

tbody tr:nth-child(even){

background:#F8FBFE;

}

/*=========================================
=             LOADING                     =
=========================================*/

.loading{

background:#fff;

padding:26px;

border-radius:16px;

text-align:center;

font-size:15px;

font-weight:600;

box-shadow:var(--sombra);

}

/*=========================================
=           RESPONSIVE                    =
=========================================*/

@media(max-width:900px){

.topbar{

flex-direction:column;

align-items:stretch;

}

#btnResumen{

width:100%;

}

h1{

font-size:28px;

}

}

</style>

</head><body>

<h1>PUNTOS EMISORES</h1>

<div class="topbar">

<button
id="btnResumen">

📊 Vista rápida

</button>

<select id="pais">

<option value="">

Seleccione país para visualizar puntos emisores

</option>

</select>

</div>

<div id="resultado"></div>

<div id="vistaRapida"></div>

<script>

let headers=[];

let rows=[];

const COLUMNS_TO_SHOW = ['PAIS', 'TIPO', 'PUNTO EMISOR', 'NOMBRE PVD', 'HERRAMIENTA', 'FILTRO 89'];

/*====================================

INICIO

====================================*/

window.onload=()=>{

cargarOpciones();

document
.getElementById("btnResumen")
.addEventListener("click",mostrarVistaRapidaTodos);

document
.getElementById("pais")
.addEventListener("change",buscarPorPais);

};

/*====================================

CARGAR OPCIONES - SOLO PAÍSES

====================================*/

function cargarOpciones(){

google.script.run

.withSuccessHandler(data=>{

llenarSelect(

"pais",

data.paises,

"Seleccione país para visualizar puntos emisores"

);

})

.withFailureHandler(error=>{

console.error('Error al cargar países:',error);

})

.getOptions();

}

/*====================================

LLENAR SELECT

====================================*/

function llenarSelect(

id,

lista,

texto

){

const select=

document.getElementById(id);

select.innerHTML="";

const opt=

document.createElement("option");

opt.value="";

opt.textContent=texto;

select.appendChild(opt);

lista.forEach(item=>{

const o=

document.createElement("option");

o.value=item;

o.textContent=item;

select.appendChild(o);

});

}

/*====================================

BUSCAR POR PAÍS (DESPLEGABLE)

====================================*/

function buscarPorPais(){

const pais = document.getElementById("pais").value;

if(!pais){

document.getElementById("resultado").innerHTML="";

return;

}

const filtros={ pais };

document.getElementById("resultado").innerHTML=

'<div class="loading">⏳ Cargando información...</div>';

google.script.run

.withSuccessHandler(data=>{

headers=data.headers;

rows=data.rows;

if(rows.length===0){

document.getElementById("resultado").innerHTML=

'<div class="loading">❌ No se encontraron resultados</div>';

}else{

mostrarTabla(rows, headers, "Puntos Emisores - " + pais);

}

})

.withFailureHandler(error=>{

document.getElementById("resultado").innerHTML=

'<div class="loading">❌ Error: '+error+'</div>';

console.error('Error en búsqueda:',error);

})

.search(filtros);

}

/*====================================

VISTA RÁPIDA - TODOS LOS PAÍSES

====================================*/

function mostrarVistaRapidaTodos(){

document.getElementById("resultado").innerHTML=

'<div class="loading">⏳ Cargando todos los puntos emisores...</div>';

google.script.run

.withSuccessHandler(data=>{

headers=data.headers;

rows=data.rows;

if(rows.length===0){

document.getElementById("resultado").innerHTML=

'<div class="loading">❌ No hay datos disponibles</div>';

}else{

mostrarTabla(rows, headers, "Vista rápida de Puntos Emisores");

}

})

.withFailureHandler(error=>{

document.getElementById("resultado").innerHTML=

'<div class="loading">❌ Error: '+error+'</div>';

console.error('Error:',error);

})

.getAllData();

}

/*====================================

MOSTRAR TABLA CON COLUMNAS ESPECÍFICAS

====================================*/

function mostrarTabla(rowsToShow, allHeaders, titulo){

// Filtrar headers para mostrar solo los que queremos
const headersToShow = allHeaders.filter(h => 
  COLUMNS_TO_SHOW.some(col => h.toUpperCase().includes(col.toUpperCase()))
);

let html=`

<h2>${titulo}</h2>

<div class="tablaResponsive">

<table>

<thead>

<tr>

`;

headersToShow.forEach(h=>{

html+=`<th>${escapeHtml(h)}</th>`;

});

html+=`

</tr>

</thead>

<tbody>

`;

rowsToShow.forEach(r=>{

html+="<tr>";

headersToShow.forEach(h=>{

html+=`

<td>

${linkify(r[h]??"")}

</td>

`;

});

html+="</tr>";

});

html+=`

</tbody>

</table>

</div>

`;

const resultado=document.getElementById("resultado");

resultado.innerHTML=html;

}

/*====================================

UTILIDADES

====================================*/

function escapeHtml(text){

const div=document.createElement("div");

div.textContent=text;

return div.innerHTML;

}

function linkify(text){

const str=String(text??"");

const urlRegex=/(https?:\/\/[^\s]+)/g;

return str.replace(urlRegex,'<a href="$1" target="_blank">🔗 Abrir</a>');

}

</script>

</body>

</html>
